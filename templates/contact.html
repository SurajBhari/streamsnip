{% extends 'layout.html' %}

{% block head_content %}
<title>StreamSnip - Contact Us</title>
<style>
    #contact-us {
        margin: 0 auto;
        width: 80%;
        padding: 40px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    #contact-us img.site_icon {
        display: block;
        max-width: 180px;
        margin: 0 auto 30px auto;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        border-radius: 12px;
    }

    #contact-us h1 {
        font-size: 2.5em;
        text-align: center;
        margin-bottom: 20px;
    }

    #contact-us p {
        font-size: 1.1em;
        line-height: 1.6;
        margin-bottom: 15px;
        text-align: justify;
    }

    @media (max-width: 768px) {
        #contact-us {
            width: 95%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div id="contact-us">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="StreamSnip Logo" class="site_icon">
    <h1>Contact Us</h1>

    <p>Best way to contact us is contacting ag1436 at discord <a href="{{discord_invite}}" style="color:blue">Here.</a> or mail us at <strong>admin@streamsnip.com</strong>.</p>
</div>
{% endblock %}
