{% extends 'layout.html' %}

{% block head_content %}
<title>StreamSnip - Change Account</title>
<style>
    body {
        backdrop-filter: blur(8px);
        background-color: rgba(255, 255, 255, 0.1);
    }
    #change-account {
        position: relative;
        padding: 2rem;
        max-width: 600px;
        margin: 5vh auto;
        border-radius: 1rem;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }
    .user-avatar {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 1rem;
    }
    .user-image {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid transparent;
    }
    .user-image.first {
        border-color: gold;
    }
    .close-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        font-size: 1.5rem;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div id="change-account" class="text-center">
    <div class="close-btn">&times;</div>
    <h2 class="mb-4">Change account</h2>
    <div class="d-flex flex-wrap justify-content-center">
        <a href="{{next}}">
            <div class="user-avatar">
                <img src="{{ current_user.image }}" alt="{{ current_user.name }}" class="user-image first">
                <div class="mt-2">{{ current_user.name }}</div>
            </div>
        </a>
        {% for user in users %}
        <a href="/change_account/{{user.id}}">
            <div class="user-avatar">
                <img src="{{ user.image }}" alt="{{ user.name }}" class="user-image ">
                <div class="mt-2">{{ user.name }}</div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
