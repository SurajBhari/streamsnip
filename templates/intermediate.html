{% extends 'layout.html' %}

{% block head_content %}
<title>StreamSnip - Pay</title>
<style>
    .content {
        padding-top: 5%;
    }
    .qr-image {
        max-width: 100%;
        height: auto;
    }
    .custom-file-upload {
        display: inline-block;
        padding: 10px 20px;
        cursor: pointer;
        background-color: #0d6efd;
        color: white;
        border-radius: 5px;
        text-align: center;
        transition: background-color 0.3s ease;
    }
    .custom-file-upload:hover {
        background-color: #0b5ed7;
    }
    #file-input {
        display: none;
    }
</style>
<script>
    function handleSubmit(event) {
        event.preventDefault();
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];

        if (!file) {
            alert("Please upload a payment screenshot.");
            return;
        }
        // if file is more than 6 mb then error out 
        if (file.size > 6 * 1024 * 1024) {
            alert("File size exceeds 6 MB. Please upload a smaller file.");
            // clear the input
            fileInput.value = "";
            return;
        }

        const formData = new FormData();
        formData.append('screenshot', file);
        formData.append('amount', {{ amount }});
        formData.append('membership', '{{ membership_type }}');

        var upgrade = {{ upgrade|tojson }};
        var url = upgrade ? "/upgrade/callback/manual" : "/pay/manual/callback";

        fetch(url, {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: formData
        })
        .then(response => {
            if (response.ok) {
                window.location.href = "/membership";
            } else {
                response.text().then(text => {
                    alert("Error: " + text);
                });
            }
        })
        .catch(error => {
            console.error("Fetch error:", error);
            alert("An error occurred. Please try again.");
        });
    }
</script>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 mb-4 text-center">
            <h2 class="mb-3 text-success">{{ transaction_note }}</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data={{ upi_link_encoded }}" alt="UPI QR Code" class="qr-image mb-3">
            <div>
                <a href="{{ upi_link }}" target="_blank" class="btn btn-success btn-lg">
                    Pay with UPI
                </a>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow">
                <div class="card-body">
                    <h4 class="card-title mb-4">Upload Payment Screenshot</h4>
                    <form onsubmit="handleSubmit(event)">
                        <div class="mb-3 text-center">
                            <label for="file-input" class="custom-file-upload">
                                <i class="fa-solid fa-upload"></i>
                            </label>
                            <input type="file" id="file-input" name="screenshot" accept="image/*" required>
                        </div>
                        <div class="d-grid">
                            <input type="submit" class="btn btn-primary btn-block" value="Submit">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
